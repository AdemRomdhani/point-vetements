services:
  - type: web
    name: point-vetements-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@pointvetements.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: IMGBB_API_KEY
        sync: false
    healthCheckPath: /api/health

  - type: static
    name: point-vetements
    plan: free
    buildCommand: |
      cd frontend
      echo "export const environment = { production: true, apiUrl: '${API_URL}', baseUrl: '' };" > src/environments/environment.prod.ts
      npm install && npx ng build --configuration=production --base-href /
    staticPublishPath: frontend/dist/point-vetements-frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        sync: false

  - type: static
    name: point-vetements-admin
    plan: free
    buildCommand: |
      cd admin
      echo "export const environment = { production: true, apiUrl: '${API_URL}', baseUrl: '', frontendUrl: '${FRONTEND_URL}' };" > src/environments/environment.prod.ts
      npm install && npx ng build --configuration=production --base-href /
    staticPublishPath: admin/dist/point-vetements-admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
