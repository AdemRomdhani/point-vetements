services:
  - type: web
    name: point-vetements
    runtime: node
    plan: free
    buildCommand: |
      cd backend && npm install
      cd ../frontend && npm install && npx ng build --configuration=production --base-href /
      cd ../admin && npm install && npx ng build --configuration=production --base-href /admin/
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@pointvetements.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: IMGBB_API_KEY
        sync: false
    healthCheckPath: /api/health
